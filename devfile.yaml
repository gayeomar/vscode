# OpenShift DevSpaces 3.x devfile (devfile spec v2.2.0)
# Targets: Red Hat OpenShift DevSpaces 3.x (che-code / VS Code editor)
#
# Bundled tooling
#   - Universal Developer Image (UDI) udi-rhel9:3.27 with Java 21, Gradle wrapper
#     support, Maven, Node, oc/kubectl CLIs already included
#   - Migration Toolkit for Applications (MTA) VS Code extension 8.1.1
#     installed from Open VSX (pinned VSIX)
#
# Extension install mechanism
#   DevSpaces 3.x reads .vscode/extensions.json from the workspace root and
#   installs each listed extension from the configured Open VSX registry.
#   For a pinned release the VSIX URI is embedded directly in the
#   .che/che-theia-plugins.yaml side-file (see below).
# ---------------------------------------------------------------------------

schemaVersion: 2.2.0

metadata:
  name: mta-ai-811
  displayName: Spring Boot Microservices + MTA 8.1.1
  description: >
    Development environment for the three-service Spring Boot call chain
    deployed on OpenShift Service Mesh 3.2 (Sail Operator / Istio).
    Includes Migration Toolkit for Applications VS Code extension 8.1.1
    for application modernisation analysis.
  version: 1.0.0
  tags:
    - Java
    - Spring Boot
    - Gradle
    - OpenShift
    - OSSM
    - MTA

# ---------------------------------------------------------------------------
# Top-level attributes
# ---------------------------------------------------------------------------
attributes:
  # Storage: one PVC per workspace (default, keeps Gradle cache across restarts)
  controller.devfile.io/storage-type: per-workspace

  # -------------------------------------------------------------------------
  # VS Code extension manifest
  # DevSpaces reads this file and auto-installs all "recommendations" at
  # workspace startup from the configured Open VSX registry.
  # The MTA extension ID on Open VSX is: redhat.mta-vscode-extension
  # -------------------------------------------------------------------------
  .vscode/extensions.json: |
    {
      "recommendations": [
        "redhat.mta-vscode-extension",
        "redhat.mta-java"
      ]
    }

  # -------------------------------------------------------------------------
  # NOTE: .che/che-theia-plugins.yaml is intentionally NOT used here.
  # That file is only read by the legacy Che Theia editor.
  # DevSpaces 3.x uses che-code (VS Code) — extensions are installed via
  # the postStart event command below (install-mta-vsix).
  # -------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:

  # -------------------------------------------------------------------------
  # Pull secret for registry.redhat.io (OPTION 1 — recommended)
  #
  # This kubernetes component creates (or updates) the pull secret in the
  # workspace namespace at DevWorkspace startup. The DevWorkspace Operator
  # applies it before the workspace pod is scheduled, so the kubelet can
  # authenticate to registry.redhat.io when pulling udi-rhel9:3.27.
  #
  # HOW TO USE:
  #   1. Base64-encode your Red Hat pull secret JSON (from
  #      https://console.redhat.com/openshift/install/pull-secret):
  #        cat pull-secret.txt | base64 -w0
  #   2. Replace REPLACE_WITH_BASE64_PULL_SECRET below with that value.
  #   3. ⚠ Do NOT commit the filled-in value to git.
  #      Use a Secret sealing tool (Sealed Secrets / Vault) for GitOps, or
  #      pre-create the secret via option 2 (oc CLI) and remove this block.
  #
  # OPTION 2 — pre-create via oc (secret stays out of the devfile entirely):
  #   oc create secret docker-registry rh-registry-pull-secret \
  #     --docker-server=registry.redhat.io \
  #     --docker-username=<your-rh-username> \
  #     --docker-password=<your-rh-token-or-password> \
  #     -n <your-devspaces-user-namespace>
  #   oc secrets link default rh-registry-pull-secret --for=pull \
  #     -n <your-devspaces-user-namespace>
  #
  # OPTION 3 — switch to the public UBI9+Java21 image (no pull secret needed):
  #   Replace the tools container image with:
  #     registry.access.redhat.com/ubi9/openjdk-21:latest
  #   Note: oc, kubectl, Helm, Tekton CLI will not be pre-installed.
  # -------------------------------------------------------------------------
  - name: rh-registry-pull-secret
    kubernetes:
      inlined: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: rh-registry-pull-secret
          labels:
            # Tells DevWorkspace Operator to watch and mount this secret
            controller.devfile.io/watch-secret: "true"
        type: kubernetes.io/dockerconfigjson
        data:
          .dockerconfigjson: 

  # -------------------------------------------------------------------------
  # Main developer container
  # Image: Red Hat Universal Developer Image (UDI) for RHEL 9
  #   Includes: Java 11/17/21, Maven, Gradle wrapper, Node 18, Git,
  #             oc, kubectl, Helm, Tekton CLI, jq, yq, vim, bash-completion
  # If your cluster uses a disconnected registry, replace the image reference
  # with your internal mirror, e.g.:
  #   registry.internal.example.com/devspaces/udi-rhel9:3.27
  # -------------------------------------------------------------------------
  - name: tools
    attributes:
      # Bind the pull secret created above to this container's image pull
      controller.devfile.io/imagePullSecrets: rh-registry-pull-secret
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:latest
      memoryLimit: 4Gi
      memoryRequest: 512Mi
      cpuLimit: "2"
      cpuRequest: 250m
      mountSources: true

      env:
        # Pin the active JDK to 21 (UDI ships multiple versions)
        - name: JAVA_HOME
          value: /usr/lib/jvm/java-21-openjdk
        - name: PATH
          value: /usr/lib/jvm/java-21-openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        # Keep Gradle cache on the persistent volume across restarts
        - name: GRADLE_USER_HOME
          value: /home/user/.gradle
        # MTA CLI (mta-cli) location — used by the VS Code extension
        - name: MTA_CLI_PATH
          value: /home/user/.mta/mta-cli

      volumeMounts:
        - name: gradle-cache
          path: /home/user/.gradle
        # Optional: cache MTA analyses between workspace restarts
        - name: mta-data
          path: /home/user/.mta

      endpoints:
        # service1 — exposed externally for smoke-testing via the IDE browser
        - name: service1
          targetPort: 8080
          exposure: public
          protocol: http
          attributes:
            discoverable: "true"
            urlRewriteSupported: "true"
        # service2 — mesh-internal; accessible within the workspace only
        - name: service2
          targetPort: 8081
          exposure: internal
          protocol: http
        # service3 — mesh-internal; accessible within the workspace only
        - name: service3
          targetPort: 8082
          exposure: internal
          protocol: http
        # Spring Boot Actuator — shared debug port for all three services
        - name: actuator
          targetPort: 8090
          exposure: internal
          protocol: http

  # -------------------------------------------------------------------------
  # Persistent volumes
  # -------------------------------------------------------------------------
  - name: gradle-cache
    volume:
      size: 2Gi

  - name: mta-data
    volume:
      size: 1Gi

# ---------------------------------------------------------------------------
# Commands
# ---------------------------------------------------------------------------
commands:

  # --- Build ----------------------------------------------------------------
  - id: build-all
    exec:
      label: "Build — all services"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: "./gradlew clean build"
      group:
        kind: build
        isDefault: true

  - id: build-service1
    exec:
      label: "Build — service1 only"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: "./gradlew :service1:clean :service1:build"
      group:
        kind: build

  - id: build-service2
    exec:
      label: "Build — service2 only"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: "./gradlew :service2:clean :service2:build"
      group:
        kind: build

  - id: build-service3
    exec:
      label: "Build — service3 only"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: "./gradlew :service3:clean :service3:build"
      group:
        kind: build

  # --- Test -----------------------------------------------------------------
  - id: test-all
    exec:
      label: "Test — all services"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: "./gradlew test"
      group:
        kind: test
        isDefault: true

  # --- Run (local profile) --------------------------------------------------
  - id: run-service1
    exec:
      label: "Run — service1 (local profile, port 8080)"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: >-
        ./gradlew :service1:bootRun
        --args='--spring.profiles.active=local --server.port=8080'
      group:
        kind: run

  - id: run-service2
    exec:
      label: "Run — service2 (local profile, port 8081)"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: >-
        ./gradlew :service2:bootRun
        --args='--spring.profiles.active=local --server.port=8081'
      group:
        kind: run

  - id: run-service3
    exec:
      label: "Run — service3 (local profile, port 8082)"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: >-
        ./gradlew :service3:bootRun
        --args='--spring.profiles.active=local --server.port=8082'
      group:
        kind: run

  # --- OpenShift deployment -------------------------------------------------
  - id: oc-apply-mesh
    exec:
      label: "OC — apply service-mesh CRs (IstioCNI + Istio + PeerAuth)"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: |
        oc apply -f openshift/service-mesh/istiocni.yaml
        oc apply -f openshift/service-mesh/istio.yaml
        oc wait istio/default --for condition=Ready --timeout=300s
        oc apply -f openshift/service-mesh/peer-authentication.yaml
      group:
        kind: deploy

  - id: oc-apply-gateway
    exec:
      label: "OC — apply Gateway API resources"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: |
        oc apply -f openshift/gateway-api/gateway-class.yaml
        oc apply -f openshift/gateway-api/gateway.yaml
        oc apply -f openshift/gateway-api/httproute-service1.yaml
      group:
        kind: deploy

  - id: oc-apply-services
    exec:
      label: "OC — deploy all application services"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: |
        for svc in service1 service2 service3; do
          oc apply -f openshift/${svc}/
        done
        oc rollout status deployment/service1 -n microservices --timeout=120s
        oc rollout status deployment/service2 -n microservices --timeout=120s
        oc rollout status deployment/service3 -n microservices --timeout=120s
      group:
        kind: deploy

  - id: oc-verify-sidecars
    exec:
      label: "OC — verify Envoy sidecar injection (2/2 READY)"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: |
        echo "=== Pods in microservices namespace ==="
        oc get pods -n microservices
        echo ""
        echo "=== Checking 2/2 READY (app + Envoy sidecar) ==="
        oc get pods -n microservices -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.containerStatuses[*].ready}{"\n"}{end}'

  # --- MTA VS Code extension install (postStart) ----------------------------
  # che-code (DevSpaces 3.x) exposes the `code` CLI to all containers in the
  # workspace pod via a shared volume. `code --install-extension <vsix-url>`
  # is the only reliable way to auto-install a pinned version at startup.
  # This command is wired into the events.postStart section below.
  - id: install-mta-vsix
    exec:
      label: "MTA — install VS Code extensions 8.1.1 (postStart)"
      component: tools
      commandLine: |
        # ------------------------------------------------------------------
        # Locate the 'code' CLI.
        # In DevSpaces 3.x (che-code) the binary is injected into the pod
        # via a shared volume; it may not be in the tools container's PATH.
        # ------------------------------------------------------------------
        CODE_BIN=""
        for candidate in \
            "$(which code 2>/dev/null)" \
            /checode/bin/code-oss \
            /checode/bin/code \
            /home/user/.vscode-server/bin/*/bin/code; do
          if [ -x "${candidate}" ]; then
            CODE_BIN="${candidate}"
            break
          fi
        done

        if [ -z "${CODE_BIN}" ]; then
          echo "ERROR: 'code' binary not found. Extensions will be installed by .che/che-editor.yaml on next workspace restart."
          exit 0
        fi
        echo "Using code binary: ${CODE_BIN}"

        # ------------------------------------------------------------------
        # redhat.mta-vscode-extension 8.1.1
        # Download VSIX locally first — 'code --install-extension <URL>'
        # is unreliable; local path install is always supported.
        # ------------------------------------------------------------------
        MTA_VSIX_URL="https://open-vsx.org/api/redhat/mta-vscode-extension/8.1.1/file/redhat.mta-vscode-extension-8.1.1.vsix"
        MTA_VSIX_LOCAL="/tmp/redhat.mta-vscode-extension-8.1.1.vsix"
        echo "Downloading redhat.mta-vscode-extension 8.1.1..."
        curl -fsSL -o "${MTA_VSIX_LOCAL}" "${MTA_VSIX_URL}"
        "${CODE_BIN}" --install-extension "${MTA_VSIX_LOCAL}" --force
        echo "mta-vscode-extension install exit code: $?"

        # ------------------------------------------------------------------
        # redhat.mta-java 8.1.1
        # Prefer the local VSIX bundled in the repo; fall back to Open VSX.
        # ------------------------------------------------------------------
        MTA_JAVA_LOCAL="${PROJECT_SOURCE}/redhat.mta-java-8.1.1.vsix"
        MTA_JAVA_URL="https://open-vsx.org/api/redhat/mta-java/8.1.1/file/redhat.mta-java-8.1.1.vsix"
        echo "Installing redhat.mta-java 8.1.1..."
        if [ -f "${MTA_JAVA_LOCAL}" ]; then
          echo "  source: local VSIX (${MTA_JAVA_LOCAL})"
          "${CODE_BIN}" --install-extension "${MTA_JAVA_LOCAL}" --force
        else
          echo "  source: Open VSX (${MTA_JAVA_URL})"
          MTA_JAVA_TMP="/tmp/redhat.mta-java-8.1.1.vsix"
          curl -fsSL -o "${MTA_JAVA_TMP}" "${MTA_JAVA_URL}"
          "${CODE_BIN}" --install-extension "${MTA_JAVA_TMP}" --force
        fi
        echo "mta-java install exit code: $?"

  # --- MTA analysis ---------------------------------------------------------
  - id: mta-install-cli
    exec:
      label: "MTA — download mta-cli 8.1.1 (used by VS Code extension)"
      component: tools
      workingDir: /home/user
      commandLine: |
        mkdir -p /home/user/.mta
        MTA_VERSION=8.1.1
        MTA_URL="https://github.com/konveyor/tackle2-addon-analyzer/releases/download/v${MTA_VERSION}/mta-cli-linux-amd64"
        echo "Downloading mta-cli ${MTA_VERSION}..."
        curl -fsSL -o /home/user/.mta/mta-cli "${MTA_URL}"
        chmod +x /home/user/.mta/mta-cli
        /home/user/.mta/mta-cli version

# ---------------------------------------------------------------------------
# Events
# Devfile v2 lifecycle hooks processed by the DevWorkspace Operator.
# postStart commands run automatically every time the workspace starts,
# before the IDE becomes available to the user.
# ---------------------------------------------------------------------------
events:
  postStart:
    - install-mta-vsix   # installs MTA VS Code extension 8.1.1 via code CLI
